<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<title>Admin · Fênix Flats</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f0f0f;color:#f0ead8;font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1.5rem}
.logo{width:56px;height:56px;border-radius:8px;background:#C9A84C;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:20px;font-weight:500;color:#111;margin:0 auto 1rem}
h1{font-family:'Playfair Display',serif;font-size:22px;font-weight:500;text-align:center}
p{font-size:13px;color:#9a9080;text-align:center;margin-top:4px}
.box{display:flex;flex-direction:column;gap:10px;width:280px}
input{background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#f0ead8;font-family:'DM Sans',sans-serif;font-size:15px;padding:12px 16px;outline:none;text-align:center;letter-spacing:.2em;width:100%}
input:focus{border-color:#C9A84C}
button{background:#C9A84C;border:none;border-radius:8px;color:#111;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;padding:12px;cursor:pointer;width:100%}
button:hover{background:#d4b050}
.erro{font-size:12px;color:#e74c3c;text-align:center;display:none}
</style>
</head>
<body>
<div>
  <div class="logo">FF</div>
  <h1>Fênix Flats</h1>
  <p>Painel administrativo</p>
</div>
<div class="box">
  <input type="password" id="s" placeholder="Digite a senha" onkeydown="if(event.key==='Enter')ok()"/>
  <button onclick="ok()">Entrar</button>
  <div class="erro" id="e">Senha incorreta.</div>
</div>
<script>
const SENHA='fenix2025';
function ok(){
  if(document.getElementById('s').value===SENHA){
    sessionStorage.setItem('ff_auth','1');
    window.location.href='../admin.html';
  } else {
    document.getElementById('e').style.display='block';
    document.getElementById('s').value='';
  }
}
// Se já autenticado, vai direto
if(sessionStorage.getItem('ff_auth')==='1') window.location.href='../admin.html';
</script>
</body>
</html>
