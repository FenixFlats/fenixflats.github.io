<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Fênix Flats · Bebidas</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --gold:#C9A84C;
  --gold-light:#e8c96a;
  --dark:#0f0f0f;
  --dark2:#1a1a1a;
  --dark3:#242424;
  --dark4:#2e2e2e;
  --text:#f0ead8;
  --text-muted:#9a9080;
  --text-dim:#5a544a;
  --radius:14px;
  --radius-sm:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:var(--dark);
  color:var(--text);
  font-family:'DM Sans',sans-serif;
  font-weight:300;
  min-height:100vh;
  padding:0;
}

/* ── HEADER ── */
.header{
  background:var(--dark2);
  border-bottom:1px solid #2a2a2a;
  padding:2rem 1.5rem 1.75rem;
  text-align:center;
  position:relative;
}
.header::after{
  content:'';
  position:absolute;
  bottom:0;left:50%;transform:translateX(-50%);
  width:60px;height:2px;background:var(--gold);
}
.logo{
  width:56px;height:56px;border-radius:var(--radius-sm);
  background:var(--gold);
  display:flex;align-items:center;justify-content:center;
  font-family:'Playfair Display',serif;
  font-size:20px;font-weight:600;color:var(--dark);
  margin:0 auto 1rem;
}
.header h1{
  font-family:'Playfair Display',serif;
  font-size:28px;font-weight:500;
  color:var(--text);
  letter-spacing:.02em;
}
.header p{
  font-size:13px;color:var(--text-muted);
  margin-top:6px;letter-spacing:.04em;
  text-transform:uppercase;
}

/* ── CONTENT ── */
.content{max-width:720px;margin:0 auto;padding:2rem 1.25rem 4rem}

/* ── SECTION LABEL ── */
.sec-label{
  font-size:10px;font-weight:500;letter-spacing:.14em;
  text-transform:uppercase;color:var(--gold);
  margin-bottom:14px;margin-top:.25rem;
}

/* ── COMBOS ── */
.combos-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(195px,1fr));
  gap:12px;
  margin-bottom:2.5rem;
}
.combo{
  background:var(--dark2);
  border:1px solid #2a2a2a;
  border-radius:var(--radius);
  overflow:hidden;
  cursor:pointer;
  transition:border-color .2s,transform .15s;
}
.combo:hover{border-color:#3a3a3a;transform:translateY(-2px)}
.combo.sel{border-color:var(--gold);background:#1e1c16}
.combo-top{
  height:110px;
  display:flex;align-items:center;justify-content:center;
  background:var(--dark3);
  font-size:52px;
}
.combo-body{padding:1rem 1.1rem 1.1rem}
.combo-pill{
  display:inline-block;
  background:#2a220a;color:var(--gold);
  font-size:11px;font-weight:500;
  padding:3px 10px;border-radius:20px;
  margin-bottom:8px;letter-spacing:.02em;
}
.combo-name{
  font-family:'Playfair Display',serif;
  font-size:16px;font-weight:500;color:var(--text);
}
.combo-desc{font-size:12px;color:var(--text-muted);margin-top:4px;line-height:1.6}
.combo-preco{
  display:flex;align-items:baseline;gap:8px;margin-top:10px;
}
.combo-preco .atual{font-size:17px;font-weight:500;color:var(--gold)}
.combo-preco .antes{font-size:12px;color:var(--text-dim);text-decoration:line-through}
.combo-check{
  display:none;
  width:20px;height:20px;border-radius:50%;
  background:var(--gold);
  align-items:center;justify-content:center;
  font-size:11px;color:var(--dark);
  margin-left:auto;
}
.combo.sel .combo-check{display:flex}

/* ── AVULSOS ── */
.prods-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(130px,1fr));
  gap:10px;
  margin-bottom:2.5rem;
}
.prod{
  background:var(--dark2);
  border:1px solid #2a2a2a;
  border-radius:var(--radius);
  overflow:hidden;
}
.prod-top{
  height:80px;
  display:flex;align-items:center;justify-content:center;
  background:var(--dark3);
  font-size:36px;
}
.prod-body{padding:.75rem .875rem .875rem}
.prod-name{font-size:13px;font-weight:400;color:var(--text)}
.prod-preco{font-size:12px;color:var(--text-muted);margin-top:2px}
.qty-row{display:flex;align-items:center;gap:8px;margin-top:10px}
.qbtn{
  width:28px;height:28px;border-radius:50%;
  border:1px solid var(--gold);background:transparent;
  color:var(--gold);font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-family:'DM Sans',sans-serif;line-height:1;
  transition:background .15s;
}
.qbtn:hover{background:#c9a84c20}
.qnum{font-size:14px;font-weight:500;color:var(--text);min-width:20px;text-align:center}

/* ── DIVISOR ── */
.div{height:1px;background:#1f1f1f;margin:2rem 0}

/* ── FORM ── */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:2rem}
.f-full{grid-column:1/-1}
.f-row{display:flex;flex-direction:column;gap:5px}
.f-label{font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--text-muted)}
input[type=text],input[type=date],select,textarea{
  background:var(--dark3);
  border:1px solid #303030;
  border-radius:var(--radius-sm);
  color:var(--text);
  font-family:'DM Sans',sans-serif;
  font-size:14px;font-weight:300;
  padding:11px 14px;
  width:100%;outline:none;
  transition:border-color .2s;
  appearance:none;-webkit-appearance:none;
}
input:focus,select:focus,textarea:focus{border-color:var(--gold)}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(.4);cursor:pointer}
select option{background:var(--dark3);color:var(--text)}
textarea{resize:vertical;min-height:72px}
.err{font-size:12px;color:#e07070;display:none;margin-top:4px}

/* ── RESUMO ── */
.sumbox{
  background:var(--dark2);
  border:1px solid #2a2a2a;
  border-radius:var(--radius);
  padding:1.1rem 1.25rem;
  margin-bottom:1.25rem;
}
.sempty{font-size:13px;color:var(--text-dim)}
.srow{
  display:flex;justify-content:space-between;
  font-size:13px;color:var(--text-muted);
  padding:4px 0;border-bottom:1px dashed #222;
}
.srow:last-of-type{border-bottom:none}
.stotal{
  display:flex;justify-content:space-between;
  font-size:16px;font-weight:500;
  color:var(--text);
  border-top:1px solid #333;
  margin-top:10px;padding-top:10px;
}
.stotal span:last-child{color:var(--gold)}

/* ── BOTÃO ── */
.btn-wpp{
  width:100%;
  background:#25D366;
  border:none;border-radius:var(--radius-sm);
  color:#fff;
  font-family:'DM Sans',sans-serif;
  font-size:15px;font-weight:500;
  padding:15px;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:10px;
  letter-spacing:.02em;
  transition:background .2s,transform .15s;
}
.btn-wpp:hover{background:#1ebe5d}
.btn-wpp:active{transform:scale(.98)}
.btn-wpp svg{width:22px;height:22px;fill:#fff;flex-shrink:0}

@media(max-width:480px){
  .form-grid{grid-template-columns:1fr}
  .f-full{grid-column:1}
  .header h1{font-size:24px}
}
</style>
</head>

<div class="header">
  <div class="logo">FF</div>
  <h1>Fênix Flats</h1>
  <p>Bebidas geladas · Peça antes do check-in</p>
</div>

  <p class="sec-label">Dados da reserva</p>
  <div class="form-grid">
    <div class="f-row f-full">

      <input type="text" id="nome" placeholder="Ex: João da Silva"/>
      <span class="err" id="err-nome">Informe o nome da reserva.</span>
    </div>
    <div class="f-row">
      <span class="f-label">Hotel</span>
      <select id="hotel">

        <option>Comfort Suites</option>
        <option>Comfort Taguatinga</option>
        <option>Go Inn Taguatinga</option>
        <option>Kubitschek Plaza</option>
        <option>Mercure</option>
        <option>Lets Idea</option>
        <option>Ramada</option>
        <option>Saint Paul Plaza</option>
        <option>Tryp Brasília Nações</option>
      </select>
      <span class="err" id="err-hotel">Selecione o hotel.</span>
    </div>
    <div class="f-row">
      <span class="f-label">Data de check-in</span>
      <input type="date" id="checkin"/>
      <span class="err" id="err-checkin">Informe a data.</span>
    </div>
    <div class="f-row f-full">
      <span class="f-label">Observações (opcional)</span>
      <textarea id="obs" placeholder="Horário de chegada, preferências..."></textarea>
    </div>
  </div>

  <p class="sec-label">Resumo do pedido</p>
  <div class="sumbox" id="sumbox">

// ── PREÇOS DOS COMBOS ────────────────────────────────────────
//   preco:    valor com desconto (o que o cliente paga)
//   original: soma dos itens avulsos (sem desconto)
//   Se não quiser desconto num combo: deixe preco igual ao original
const COMBOS=[
  {
    id:'c1',
    nome:'Kit Refresco',
    desc:'2× Água sem gás · 1× Coca-Cola · 1× Guaraná Antarctica',
    emoji:'🥤', img:'',
    preco:    21,   // ← preço com desconto
    original: 24,   // ← soma dos avulsos (2×R$5 + R$7 + R$7)
  },
  {
    id:'c2',
    nome:'Happy Hour',
    desc:'4× Heineken gelada · 2× Água sem gás',
    emoji:'🍺', img:'',
    preco:    37,   // ← preço com desconto
    original: 42,   // ← soma dos avulsos (4×R$8 + 2×R$5)
  },
  {
    id:'c3',
    nome:'Kit Completo',
    desc:'2× Heineken · 1× Coca-Cola · 1× Guaraná · 2× Água',
    emoji:'🎉', img:'',
    preco:    35,   // ← preço com desconto
    original: 40,   // ← soma dos avulsos (2×R$8 + R$7 + R$7 + 2×R$5)
  },
];

// ════════════════════════════════════════════════════════════
//  ⛔ NÃO MEXA ABAIXO DESTA LINHA
// ════════════════════════════════════════════════════════════
</script>
<script>

// COMBOS e PRODS definidos no bloco de configuração acima

const qtds={};PRODS.forEach(p=>qtds[p.id]=0);
const comboQtds={};COMBOS.forEach(c=>comboQtds[c.id]=0);

// Render combos
const cg=document.getElementById('combos-grid');
COMBOS.forEach(c=>{
  const el=document.createElement('div');
  el.className='combo';el.id='cc-'+c.id;
  el.innerHTML=`
    <div class="combo-top">${c.img ? `<img src="${c.img}" alt="${c.nome}" style="width:80px;height:90px;object-fit:contain;">` : c.emoji}</div>
    <div class="combo-body">
      ${c.original>c.preco?`<span class="combo-pill">Economize R$ ${(c.original-c.preco).toFixed(0)}</span>`:''}
      <p class="combo-name">${c.nome}</p>
      <p class="combo-desc">${c.desc}</p>
      <div class="combo-preco">
        ${c.original>c.preco?`<span class="antes">R$ ${c.original.toFixed(2)}</span>`:''}
        <span class="atual">R$ ${c.preco.toFixed(2)}</span>
      </div>
      <div class="qty-row" style="margin-top:10px">
        <button class="qbtn" onclick="event.stopPropagation();chgCombo('${c.id}',-1)">−</button>
        <span class="qnum" id="cq-${c.id}">0</span>
        <button class="qbtn" onclick="event.stopPropagation();chgCombo('${c.id}',1)">+</button>
      </div>
    </div>`;
  cg.appendChild(el);
});

// Render avulsos
const pg=document.getElementById('prods-grid');
PRODS.forEach(p=>{
  const el=document.createElement('div');
  el.className='prod';
  el.innerHTML=`
    <div class="prod-top">${p.img ? `<img src="${p.img}" alt="${p.nome}" style="width:70px;height:70px;object-fit:contain;">` : p.emoji}</div>
    <div class="prod-body">
      <p class="prod-name">${p.nome}</p>
      <p class="prod-preco">R$ ${p.preco.toFixed(2)}</p>
      <div class="qty-row">
        <button class="qbtn" onclick="chg('${p.id}',-1)">−</button>
        <span class="qnum" id="q-${p.id}">0</span>
        <button class="qbtn" onclick="chg('${p.id}',1)">+</button>
      </div>
    </div>`;
  pg.appendChild(el);
});

function chgCombo(id,d){
  comboQtds[id]=Math.max(0,comboQtds[id]+d);
  document.getElementById('cq-'+id).textContent=comboQtds[id];
  const card=document.getElementById('cc-'+id);
  comboQtds[id]>0?card.classList.add('sel'):card.classList.remove('sel');
  renderSum();
}

function chg(id,d){
  qtds[id]=Math.max(0,qtds[id]+d);
  document.getElementById('q-'+id).textContent=qtds[id];
  renderSum();
}

function renderSum(){
  const el=document.getElementById('sumbox');
  let rows=[],total=0;
  COMBOS.forEach(c=>{
    if(comboQtds[c.id]>0){const s=c.preco*comboQtds[c.id];rows.push({l:comboQtds[c.id]+'× Combo '+c.nome,v:s});total+=s;}
  });
  PRODS.forEach(p=>{
    if(qtds[p.id]>0){const s=p.preco*qtds[p.id];rows.push({l:qtds[p.id]+'× '+p.nome,v:s});total+=s;}
  });
  if(!rows.length){el.innerHTML='<span class="sempty">Nenhum item selecionado ainda.</span>';return;}
  let html=rows.map(r=>`<div class="srow"><span>${r.l}</span><span>R$ ${r.v.toFixed(2)}</span></div>`).join('');
  html+=`<div class="stotal"><span>Total</span><span>R$ ${total.toFixed(2)}</span></div>`;
  el.innerHTML=html;
}

// SCRIPT_URL definida no bloco de configuração acima

function fmt(s){if(!s)return'';const[y,m,d]=s.split('-');return`${d}/${m}/${y}`}

function enviar(){
  const nome=document.getElementById('nome').value.trim();
  const hotel=document.getElementById('hotel').value;
  const ci=document.getElementById('checkin').value;
  const obs=document.getElementById('obs').value.trim();
  ['nome','hotel','checkin'].forEach(id=>document.getElementById('err-'+id).style.display='none');
  let ok=true;
  if(!nome){document.getElementById('err-nome').style.display='block';ok=false;}
  if(!hotel){document.getElementById('err-hotel').style.display='block';ok=false;}
  if(!ci){document.getElementById('err-checkin').style.display='block';ok=false;}
  if(!COMBOS.some(c=>comboQtds[c.id]>0)&&!PRODS.some(p=>qtds[p.id]>0)){alert('Selecione ao menos um item ou combo.');ok=false;}
  if(!ok)return;

  let total=0,itens=[];
  COMBOS.forEach(c=>{
    if(comboQtds[c.id]>0){const s=c.preco*comboQtds[c.id];itens.push({desc:'Combo '+c.nome,qty:comboQtds[c.id],unit:c.preco,sub:s});total+=s;}
  });
  PRODS.forEach(p=>{
    if(qtds[p.id]>0){const s=p.preco*qtds[p.id];itens.push({desc:p.nome,qty:qtds[p.id],unit:p.preco,sub:s});total+=s;}
  });

  // Gerar código do pedido
  const codigo='FF'+Date.now().toString(36).toUpperCase().slice(-5);

  // Salvar no Google Sheets via Apps Script
  const pedido={codigo,nome,hotel,checkin:ci,obs,itens,total,criadoEm:new Date().toISOString()};
  const url=SCRIPT_URL+'?action=salvar&dados='+encodeURIComponent(JSON.stringify(pedido));
  fetch(url,{method:'GET',mode:'no-cors'}).catch(()=>{});

  // Montar mensagem WhatsApp
  const linhas=itens.map(i=>(i.desc.startsWith('Combo')?'🎁 ':'• ')+i.qty+'× '+i.desc+' — R$ '+i.sub.toFixed(2));
  let msg='🍺 *Pedido Fênix Flats*\n';
  msg+='🔖 Código: *'+codigo+'*\n\n';
  msg+='👤 Nome: *'+nome+'*\n';
  msg+='🏨 Hotel: *'+hotel+'*\n';
  msg+='📅 Check-in: *'+fmt(ci)+'*\n\n';
  msg+='*Itens:*\n'+linhas.join('\n')+'\n\n';
  msg+='*Total: R$ '+total.toFixed(2)+'*';
  if(obs) msg+='\n\n📝 Obs: '+obs;
  msg+='\n\n_Aguardando confirmação e link de pagamento._';

  // ⚠️ Substitua pelo seu número com DDI: 5561999990000
  const numero=MEU_WHATSAPP;
  window.open('https://wa.me/'+numero+'?text='+encodeURIComponent(msg),'_blank');

  // Feedback visual
  document.querySelector('.btn-wpp').textContent='✓ Pedido enviado! Código: '+codigo;
  document.querySelector('.btn-wpp').style.background='#1a7a3a';
}
</script>
</body>
</html>
